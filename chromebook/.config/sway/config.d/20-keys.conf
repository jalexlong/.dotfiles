# Chromebook top-row function keys
# F1=Back  F2=Forward  F3=Refresh  F4=Fullscreen
# F5=<skip>  F6=Brightness-  F7=Brightness+
# F8=Mute  F9=Vol-  F10=Vol+

bindsym F1  workspace prev
bindsym F2  workspace next
bindsym F3  reload
bindsym F4  fullscreen toggle

bindsym F6  exec brightnessctl set 5%-
bindsym F7  exec brightnessctl set 5%+

bindsym F8  exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindsym F9  exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindsym F10 exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

