# Chromebook hardware keys and convenience bindings

# Brightness
bindsym XF86MonBrightnessUp exec brightnessctl set +5%
bindsym XF86MonBrightnessDown exec brightnessctl set 5%-

# Audio
bindsym XF86AudioRaiseVolume exec pactl set-sink-volume @DEFAULT_SINK@ +5%
bindsym XF86AudioLowerVolume exec pactl set-sink-volume @DEFAULT_SINK@ -5%
bindsym XF86AudioMute exec pactl set-sink-mute @DEFAULT_SINK@ toggle

# Media
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous

# Clipboard helpers
bindsym $mod+c exec wl-copy < /dev/null

# Quick system tools
bindsym $mod+Shift+b exec sh -c 'pkill -SIGUSR1 waybar || waybar'
bindsym $mod+Shift+n exec makoctl dismiss --all
bindsym $mod+Control+l exec swaylock -c 11111b

# Chromebook-friendly terminal shortcuts
bindsym $mod+t exec kitty
bindsym $mod+Shift+t exec kitty --title floating-terminal
for_window [title="floating-terminal"] floating enable, resize set width 900 px height 500 px, move position center
