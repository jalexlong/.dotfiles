# Locking and idle behaior for paperweight-pro

set $lock_cmd swaylock --config ~/.config/swaylock/config

bindsym Ctrl+Alt+l exec $lock_cmd

exec swayidle -w \
    timeout 750 '$lock_cmd' \
    timeout 900 'swaymsg "output * power off"' \
    resume 'swaymsg "output * power on"' \
    before-sleep '$lock_cmd'

