# paperweight-pro theme
# Cohesive lightweight "trashbook cyberdeck" look.

font pango:JetBrainsMono Nerd Font 9

default_border pixel 2
default_floating_border pixel 2

gaps inner 6
gaps outer 3
smart_gaps on

# Catppuccin-ish dark palette, tuned for low-distraction use.
client.focused          #89b4fa #89b4fa #11111b #89b4fa
client.focused_inactive #45475a #45475a #cdd6f4 #45475a
client.unfocused        #313244 #313244 #a6adc8 #313244
client.urgent           #f38ba8 #f38ba8 #11111b #f38ba8
client.placeholder      #313244 #313244 #cdd6f4 #313244

# Make common utility windows float.
for_window [app_id="pavucontrol"] floating enable
for_window [app_id="blueman-manager"] floating enable
for_window [app_id="nm-connection-editor"] floating enable
for_window [title="Picture-in-Picture"] floating enable, sticky enable

# Browser dialogs and file pickers.
for_window [window_role="pop-up"] floating enable
for_window [window_role="bubble"] floating enable
for_window [window_role="dialog"] floating enable
for_window [window_type="dialog"] floating enable

# Waybar should use Chromebook-specific config.
exec_always pkill waybar; waybar
exec_always pkill mako; mako --config ~/.config/mako/config-chromebook
