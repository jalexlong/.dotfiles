# paperweight-pro theme

font pango:JetBrainsMono Nerd Font 7

default_border pixel 2
default_floating_border pixel 2

gaps inner 6
gaps outer 3

# Catppuccin Macchiato colors for Sway
# https://github.com/catppuccin/catppuccin
set $rosewater  #f4dbd6
set $flamingo   #f0c6c6
set $pink       #f5bde6
set $mauve      #c6a0f6
set $red        #ed8796
set $maroon     #ee99a0
set $peach      #f5a97f
set $yellow     #eed49f
set $green      #a6da95
set $teal       #8bd5ca
set $sky        #91d7e3
set $sapphire   #7dc4e4
set $blue       #8aadf4
set $lavender   #b7bdf8

set $text       #cad3f5
set $subtext1   #b8c0e0
set $subtext0   #a5adcb
set $overlay2   #939ab7
set $overlay1   #8087a2
set $overlay0   #6e738d
set $surface2   #5b6078
set $surface1   #494d64
set $surface0   #363a4f
set $base       #24273a
set $mantle     #1e2030
set $crust      #181926

client.focused          $lavender   $lavender   $crust  $lavender
client.focused_inactive $surface1   $surface0   $text   $surface1
client.unfocused        $surface0   $surface0   $text   $surface0
client.urgent           $red        $red        $crust  $red
client.placeholder      $surface0   $surface0   $text   $surface0

# Make common utility windows float.
for_window [app_id="pavucontrol"] floating enable
for_window [app_id="blueman-manager"] floating enable
for_window [app_id="nm-connection-editor"] floating enable
for_window [title="Picture-in-Picture"] floating enable, sticky enable

# Browser dialogs and file pickers.
for_window [window_role="pop-up"] floating enable
for_window [window_role="bubble"] floating enable
for_window [window_role="dialog"] floating enable
for_window [window_type="dialog"] floating enable
